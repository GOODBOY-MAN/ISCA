<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ISCA Admin Dashboard</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial,sans-serif;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
color:#ffd700;
}

.box{
background:#161616;
padding:20px;
margin:20px 0;
border-radius:20px;
border:1px solid #333;
}

input,select,textarea{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;

}

button{

width:100%;
padding:14px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:10px;

}

#dashboard{
display:none;
}

.student{

padding:10px;
margin:5px 0;
background:#222;
border-radius:10px;

}

</style>

</head>

<body>

<div class="container">

<h1>🔒 ISCA ADMIN</h1>

<div class="box">

<h2>Coach Login</h2>

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">
LOGIN
</button>

</div>

<div id="dashboard">

<div class="box">

<h2>📢 Add Announcement</h2>

<textarea
id="announcement"
placeholder="Write announcement">
</textarea>

<button onclick="saveAnnouncement()">
SAVE ANNOUNCEMENT
</button>

</div>

<div class="box">

<h2>➕ Add Student</h2>

<input id="studentName" placeholder="Student Name">

<button onclick="addStudent()">
ADD STUDENT
</button>

</div>

<div class="box">

<h2>📊 Update Player Stats</h2>

<input id="editName" placeholder="Student Name">

<input id="editRuns" placeholder="Runs">

<input id="editWickets" placeholder="Wickets">

<input id="editRank" placeholder="Ranking">

<input id="editRemarks" placeholder="Coach Remarks">

<input id="editPotm" placeholder="POTM">

<button onclick="updateStats()">
UPDATE STATS
</button>

</div>

<div class="box">

<h2>🗑️ Delete Student</h2>

<select id="deleteList">

<option>Select Student</option>

</select>

<button onclick="deleteStudent()">
DELETE STUDENT
</button>
</div>

<div class="box">

<h2>🏆 Add Tournament</h2>

<input id="tourName" placeholder="Tournament Name">

<input id="tourDate" placeholder="Date">

<input id="tourStatus" placeholder="Status">

<button onclick="addTournament()">

ADD TOURNAMENT

</button>

<div class="box">

<h2>👥 Current Students</h2>

<div id="studentList"></div>

</div>

</div>

<script>

let students=[];

fetch("https://script.google.com/macros/s/AKfycbyuTXsYUcXtrBlerCXoQDIgDdX4NTniMRn1rHgiPZG_GiSbH6urWRsdTYUIwfTBgSW2/exec")
.then(r=>r.json())
.then(data=>{

students = data.students.map(s=>s.NAME);

refresh();

});

function login(){

let p=document.getElementById("password").value;

if(p==="ISCA2026"){

document.getElementById("dashboard").style.display="block";

refresh();

}

else{

alert("Wrong Password");

}

}



function refresh(){

let list=document.getElementById("studentList");

let del=document.getElementById("deleteList");

list.innerHTML="";

del.innerHTML="";

students.forEach(name=>{

list.innerHTML+=`<div class="student">${name}</div>`;

del.innerHTML+=`<option>${name}</option>`;

});

}



function addStudent(){

let name=document.getElementById("studentName").value;

if(name==="") return;

fetch("https://script.google.com/macros/s/AKfycbyuTXsYUcXtrBlerCXoQDIgDdX4NTniMRn1rHgiPZG_GiSbH6urWRsdTYUIwfTBgSW2/exec",{

method:"POST",

body:JSON.stringify({

action:"addStudent",

name:name

})

})

.then(r=>r.json())

.then(data=>{

alert("✅ Student Added");

students.push(name);

document.getElementById("studentName").value="";

refresh();

})

.catch(()=>{

alert("❌ Error");

});

}



function saveAnnouncement(){

let message=document.getElementById("announcement").value;

if(message==="") return;

fetch("https://script.google.com/macros/s/AKfycbyuTXsYUcXtrBlerCXoQDIgDdX4NTniMRn1rHgiPZG_GiSbH6urWRsdTYUIwfTBgSW2/exec",{

method:"POST",

body:JSON.stringify({

action:"addAnnouncement",

message:message

})

})

.then(r=>r.json())

.then(data=>{

alert("📢 Announcement Saved");

document.getElementById("announcement").value="";

})

.catch(()=>{

alert("❌ Error");

});

}



function deleteStudent(){

let name=document.getElementById("deleteList").value;

students=students.filter(s=>s!==name);

refresh();

}
function updateStats(){

fetch("https://script.google.com/macros/s/AKfycbyuTXsYUcXtrBlerCXoQDIgDdX4NTniMRn1rHgiPZG_GiSbH6urWRsdTYUIwfTBgSW2/exec",{

method:"POST",

body:JSON.stringify({

action:"updateStats",

name:document.getElementById("editName").value,

runs:document.getElementById("editRuns").value,

wickets:document.getElementById("editWickets").value,

ranking:document.getElementById("editRank").value,

remarks:document.getElementById("editRemarks").value,

potm:document.getElementById("editPotm").value

})

})

.then(()=>{

alert("✅ Stats Updated");

});

}



function addTournament(){

fetch("https://script.google.com/macros/s/AKfycbyuTXsYUcXtrBlerCXoQDIgDdX4NTniMRn1rHgiPZG_GiSbH6urWRsdTYUIwfTBgSW2/exec",{

method:"POST",

body:JSON.stringify({

action:"addTournament",

name:document.getElementById("tourName").value,

date:document.getElementById("tourDate").value,

status:document.getElementById("tourStatus").value

})

})

.then(()=>{

alert("🏆 Tournament Added");

});

}
</script>

</body>

</html>
