<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISCA 3D COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, sans-serif;
            background: #090909;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: radial-gradient(rgba(255,255,255,.25) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: .12;
        }

        .header {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,.08);
        }

        .logo {
            font-family: Orbitron;
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 12px;
            color: #ffd700;
        }

        .motto {
            text-align: center;
            font-size: 14px;
            opacity: .8;
            margin-top: 5px;
        }

        .hero {
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen {
            width: 950px;
            max-width: 95%;
            height: 330px;
            background: linear-gradient(180deg, #101010, #1c1c1c);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.08);
            box-shadow: 0 0 60px rgba(255,215,0,.12);
        }

        .glow {
            position: absolute;
            width: 520px;
            height: 520px;
            top: -260px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,.18), transparent);
        }

        .r1 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.1);
        }

        .r2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.08);
        }

        .bigtitle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-family: Orbitron;
            font-size: 60px;
            font-weight: 900;
            letter-spacing: 10px;
        }

        .subtitle {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            opacity: .75;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 950px;
            max-width: 95%;
            margin-top: 40px;
        }

        .card {
            height: 130px;
            background: rgba(255,255,255,.05);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
            border: 1px solid rgba(255,255,255,.08);
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255,215,0,.08);
        }

        .workspace {
            display: none;
            width: 950px;
            max-width: 95%;
            margin: 40px auto;
            padding: 30px;
            border-radius: 30px;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
        }

        .student {
            padding: 18px;
            margin: 10px 0;
            border-radius: 18px;
            background: rgba(255,255,255,.05);
            cursor: pointer;
            font-size: 18px;
        }

        .student:hover {
            background: rgba(255,215,0,.08);
        }

        @media (max-width:850px) {
            .menu {
                grid-template-columns: 1fr;
            }
            .bigtitle {
                font-size: 42px;
            }
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div>
            <div class="logo">ISCA</div>
            <div class="motto">KORBO LORBO SHEKHABO RE</div>
        </div>
    </div>

    <div class="hero">
        <div class="screen">
            <div class="glow"></div>
            <div class="r1"></div>
            <div class="r2"></div>
            <div class="bigtitle">ISCA</div>
            <div class="subtitle">ISHAAN SHREYAN CRICKET ACADEMY</div>
        </div>

        <div class="menu">
            <div class="card" onclick="openSection('announcements')">ANNOUNCEMENTS</div>
            <div class="card" onclick="openSection('leaderboard')">LEADERBOARD</div>
            <div class="card" onclick="openSection('players')">PLAYER UNIVERSE</div>
            <div class="card" onclick="openSection('tournaments')">TOURNAMENT HUB</div>
            <div class="card" onclick="openSection('coach')">COACH HQ</div>
            <div class="card" onclick="openSection('feedback')">FEEDBACK</div>
        </div>
    </div>

    <div id="workspace" class="workspace"></div>

    <script src="script.js"></script>
</body>
</html>
